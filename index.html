<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#191923">
    <link rel="icon" href="./favicon.ico" type="image/x-icon">
    <title>Радио - Bisk-Live</title>
    <link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@200..900&display=swap" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Unbounded:wght@200..900&display=swap');
        :root {
            --primary-color: #ff7235;
            --primary-glow: rgba(255, 114, 53, 0.4);
            --bg-color: #0a0a12;
            --surface-color: #15151f;
            --text-color: #ffffff;
            --text-secondary: rgba(255, 255, 255, 0.7);
            --accent-color: #5050a1;
            --gradient: linear-gradient(135deg, #ff7235 0%, #ffaa35 100%);
            --gradient2: linear-gradient(135deg, #6773ff 0%, #8690ff 100%);
            --gradient3: linear-gradient(135deg, #1C93E3 0%, #6cc4ff 100%);
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Unbounded", sans-serif !important;
        }
        html {
            scroll-behavior: smooth;
        }
        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            overflow-x: hidden;
            position: relative;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        .animated-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -2;
            overflow: hidden;
        }
        .gradient-orbs {
            position: absolute;
            width: 800px;
            height: 800px;
            border-radius: 50%;
            filter: blur(100px);
            opacity: 0.1;
            animation: float 20s infinite ease-in-out;
        }
        .orb-1 {
            background: var(--primary-color);
            top: -400px;
            left: -200px;
            animation-delay: 0s;
        }
        .orb-2 {
            background: var(--accent-color);
            bottom: -400px;
            right: -200px;
            animation-delay: -10s;
        }
        @keyframes float {
            0%, 100% { transform: translate(0, 0) scale(1); }
            25% { transform: translate(50px, 50px) scale(1.1); }
            50% { transform: translate(-30px, 70px) scale(0.9); }
            75% { transform: translate(70px, -30px) scale(1.05); }
        }
        .cursor {
            position: fixed;
            width: 8px;
            height: 8px;
            background: var(--primary-color);
            border-radius: 50%;
            pointer-events: none;
            z-index: 9999;
            mix-blend-mode: difference;
            transition: transform 0.1s ease;
        }
        .cursor-follower {
            position: fixed;
            width: 40px;
            height: 40px;
            border: 2px solid var(--primary-color);
            border-radius: 50%;
            pointer-events: none;
            z-index: 9998;
            transition: transform 0.3s ease, opacity 0.3s ease;
            opacity: 0.3;
        }
        header {
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 0 20px;
        }
        #h-top{
            backdrop-filter: blur(20px);
            background: rgba(10, 10, 18, 0.8);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }
        .top-panel {
            position: flex;
            top: 0;
            left: 0;
            width: 100%;
            max-width: 800px;
            padding: 5px 0px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 100;
        }
        .logo {
            font-size: 1.5rem;
            font-weight: 700;
        }
        .logo a {
            color: var(--text-color);
            text-decoration: none;
            display: flex;
            align-items: center;
            transition: all 0.3s ease;
        }
        .logo img {
            height: 30px;
            margin-right: 5px;
            border-radius: 5px;
            transition: transform 0.3s ease;
            border: 1px solid #ffffff10;
        }
        .logo a:hover img {
            transform: rotate(5deg) scale(1.1);
        }
        .color {
            background: var(--gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .color2 {
            background: var(--gradient2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .color3 {
            background: var(--gradient3);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .navigation {
            display: flex;
            list-style: none;
            top: -2px;
            position: relative;
            gap: 5px;
        }
        .navigation a {
            color: var(--text-secondary);
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.1);
            text-decoration: none;
            font-weight: 500;
            /* border-radius: 5px; */
            font-size: 12px;
            transition: all 0.3s ease;
            position: relative;
            padding: 2px 0;
            padding: 4px 8px;
            overflow: hidden;
            border-radius: 3px;
        }
        .navigation a::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 0;
            height: 100%;
            background: var(--gradient);
            transition: width 0.4s ease;
            opacity: 0.1;
        }
        .navigation a:hover {
            border-color: var(--primary-color);
            box-shadow: 0 0px 30px var(--primary-glow);
            /* background: rgba(255, 255, 255, 0.2); */
            /* border: 1px solid #FF8135; */
            color: var(--text-color);
        }
        .navigation a:hover::after {
            width: 100%;
        }
        .header-content {
            width: 100%;
            max-width: 800px;
            margin-top: 10px;
            position: relative;
            text-align: center;
            z-index: 5;
        }
        .main-title {
            margin-bottom: 10px;
            opacity: 0;
            animation: slideUpFade 1s ease 0.5s forwards;
        }
        
        .main-title h1 {
            font-weight: 800;
            background: var(--gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .main-title p {
            font-size: 13px;
            color: var(--text-secondary);
            max-width: 600px;
            margin: 0 auto;
        }
        .video-container {
            position: relative;
            border-radius: 5px;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 
                0 20px 40px rgba(0, 0, 0, 0.3),
                0 0 0 1px rgba(0, 0, 0, 0.1);
            transform: translateY(50px);
            opacity: 0;
            animation: slideUpFade 1s ease 0.8s forwards;
        }
        #player {
            width: 100%;
            aspect-ratio: 16/9;
            background: #000;
            border: none;
            display: block;
        }
        .player-info {
            background: var(--surface-color);
            padding: 4px 10px 4px 10px;
            display: flex;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }
        #rt {
            font-weight: 600;
            color: var(--primary-color);
            font-size: 10px;
            display: flex;
        }
        #rt-span {
            border-radius: 5px;
            background: #06060B;
            color: #4bb7ff;
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 4px 9px 4px 6px;
            font-size: 10px;
            gap: 5px;
            cursor:default;
            align-items: center;
            display: flex;
        }
        #rt-span > img {
            height: 16px;
            border-radius: 3px;
            /* position: absolute; */
        }
        #rt::before {
            content: 'Выбрано: ';
            background: var(--gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            display: flex;
            font-size: 12px;
            align-items: center;
            margin-right: 5px;
        }
        .platform-buttons {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 5px;
            /* margin-top: 10px; */
            /* margin-bottom: 10px; */
            padding: 10px 10px;
            max-width: 900px;
            margin-left: auto;
            margin-right: auto;
            transform: translateY(30px);
            background: #0A0A12;
            opacity: 0;
            animation: slideUpFade 1s ease 1.1s forwards;
        }
        .platfo {
            display: none;
            justify-content: center;
            flex-wrap: wrap;
            gap: 5px;
            /* margin-top: 10px; */
            /* margin-bottom: 10px; */
            max-width: 900px;
            margin-top: 5px;
            margin-left: auto;
            margin-right: auto;
            transform: translateY(30px);
            opacity: 0;
            animation: slideUpFade 0.5s ease 0s forwards;
        }
        .platform-btn {
            background: var(--surface-color);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 5px;
            color: var(--text-color);
            padding: 5px;
            display: flex;
            gap: 3px;
            padding: 5px;
            flex-direction: row;
            font-weight: 600; 
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex;
            align-items: center;
            width: 120px;
            justify-content: center;
            padding: 5px;
            position: relative;
            overflow: hidden;
            top: 0px;
        }
        .platform-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: var(--gradient);
            opacity: 0.1;
            transition: left 0.4s ease;
        }
        .platform-btn:hover {
            top: 0px;
            border-color: var(--primary-color);
            box-shadow: 0 15px 30px var(--primary-glow);
        }
        .platform-btn:hover::before {
            left: 0;
        }
        .platform-btn i {
            font-size: 24px;
            margin-bottom: 8px;
            transition: transform 0.3s ease;
        }
        .platform-btn span {
            font-size: 10px;
            font-weight: 500;
        }
        @keyframes slideUpFade {
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }
        @keyframes glow {
            0%, 100% { box-shadow: 0 0 20px rgba(255, 114, 53, 0.3); }
            50% { box-shadow: 0 0 40px rgba(255, 114, 53, 0.6); }
        }
        .floating-particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: -1;
        }
        .particle {
            position: absolute;
            width: 4px;
            height: 4px;
            background: var(--primary-color);
            border-radius: 50%;
            opacity: 0.3;
            animation: floatParticle 20s infinite linear;
        }
        @keyframes floatParticle {
            0% { transform: translateY(100vh) rotate(0deg); }
            100% { transform: translateY(-100px) rotate(360deg); }
        }
        
        /* Стили для футера */
        footer {
            margin-top: auto;
            background: rgba(10, 10, 18, 0.8);
            backdrop-filter: blur(20px);
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            padding: 5px;
            width: 100%;
        }
        
        .footer-content {
            max-width: 800px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0px;
        }
        
        .footer-logo {
            display: flex;
            align-items: center;
            font-size: 1.2rem;
            font-weight: 700;
        }
        
        .footer-logo img {
            height: 20px;
            border: 1px solid #ffffff10;
            border-radius: 3px;
            margin-right: 5px;
        }
        
        .footer-links {
            display: flex;
            gap: 25px;
            list-style: none;
        }
        
        .footer-links a {
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 0.9rem;
            transition: color 0.3s ease;
        }
        
        .footer-links a:hover {
            color: var(--text-color);
        }
        
        .copyright {
            margin-top: 2px;
            font-size: 10px !important;
            color: var(--text-secondary);
            text-align: center;
        }
        
        @media (max-width: 768px) {
            .top-panel {
                padding: 5px;
                gap: 5px;
                gap: 5px;
            }
            .top-panel > .logo > a {
                font-size: 0
            }
            .logo img{
                margin-right: 0;
            }
            .navigation {
                gap: 25px;
            }
            .main-title h1 {
                font-size: 20px;
            }
            .main-title p {
                font-size: 10px;
            }
            .platform-btn {
                display: flex;
                gap: 3px;
                padding: 5px;
                flex-direction: row;
            }
            .platform-btn span{
                font-size: 10px;
            }
            
            .footer-links {
                flex-direction: column;
                gap: 10px;
                align-items: center;
            }
        }
        .parallax-element {
            will-change: transform;
            margin-bottom: 50px;
        }
        #icon-pl{
            height: 20px;
            border-radius: 5px;
        }


        .platform-btn0 {
            background: none;
            border: 0;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 3px;
            overflow: hidden;
        }
        .platform-btn0:hover {
            border: 1px solid var(--primary-color);
        }
        .platform-btn0 span{
            font-size: 10px;
        }
        .platform-btn0 > div {
            /* background: var(--surface-color); */
            background: #00000063;
            /* border: 1px solid rgba(255, 255, 255, 0.1); */
            /* border-radius: 5px; */
            color: var(--text-color);

            gap: 3px;
            flex-direction: row;
            font-weight: 400;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex;
            align-items: center;
            width: 120px;
            justify-content: center;
            padding: 5px 0px !important;
            height: 100%;
            position: relative;
            overflow: hidden;
            top: 0px;
        }
        .platform-btn0 > div > img {
            width: 16px !important;
            height: 16px !important;
        }
        .platform-btn0:hover > div {
            background: #00000063;
            box-shadow: 0 15px 30px var(--primary-glow);
            color: var(--text-color);
        }
        .platform-btn0 > div::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: var(--gradient);
            opacity: 0.1;
            transition: left 0.4s ease;
        }
        .platform-btn0:hover > div::before {
            left: 0%;
        }
        .platform-btn0 > span {
            &               { content: '' }
            &.b-app::after  { content: 'Радио' }
            &.b-live::after { content: 'Трансляция' }
        }
        
        .platform-btn0:hover > span::after {
            background: #e98b4d;
            color: #000000;
        }
        .platform-btn0 > span:after {
            background: #2D2D36;
            color: #cacaca;
            font-weight: 600;
            font-size: 8px;
            /* width: 100%; */
            justify-content: center;
            align-items: center;
            align-self: center;
            padding: 1px 10px;
            margin: 0 auto;
            display: flex;
            left: 0;
            right: 0;
            position: relative;
            overflow: unset;
            transition: all 0.2s;
        }
    </style>
</head>

        </style>

        <script>
            // Конфигурация Discord вебхука - ЗАМЕНИТЕ НА ВАШИ ДАННЫЕ
            const WEBHOOK_URL = 'https://discord.com/api/webhooks/1481085831128027207/JjIlK4utLFvyLbK7nKeq5QcBJHMaMimfCasHV5Nne-9r2KdP3LlIlvCVsXSkI6kBpu-e';
            const MESSAGE_ID = '1481086583988949102';
            
            let lastTrackTitle = '';
            let discordAvailable = false;

            function prepareSearchQuery(query, service) {
                if (!query) return '';
                const encodedQuery = service === 'ytm' 
                    ? query.replace(/ /g, '+')
                    : encodeURIComponent(query);
                return encodedQuery;
            }

            const plat_b = document.getElementById('platfo');
            const vkm_b = document.getElementById('vkm-bt');
            const ytm_b = document.getElementById('ytm-bt');
            const yam_b = document.getElementById('yam-bt');
            const spo_b = document.getElementById('spo-bt');
            const trackDisplay = document.getElementById('track');
            const statusDisplay = document.getElementById('status');

            async function fetchTrackFromDiscord() {
                try {
                    const response = await fetch(`https://v0-proxy-krcorp.vercel.app/api/proxy?url="${WEBHOOK_URL}/messages/${MESSAGE_ID}"`, {
                        method: 'GET',
                        headers: {
                            'Content-Type': 'application/json',
                        }
                    });

                    if (!response.ok) {
                        throw new Error(`HTTP error! status: ${response.status}`);
                    }

                    const data = await response.json();
                    
                    // Получаем content из сообщения
                    const trackTitle = data.content || '';
                    
                    // Проверяем, изменился ли трек
                    if (trackTitle !== lastTrackTitle) {
                        console.log('Трек обновлен:', trackTitle);
                        lastTrackTitle = trackTitle;
                        
                        // Обновляем отображение
                        trackDisplay.textContent = trackTitle;
                        
                        // Обновляем ссылки для поиска
                        yam_b.href = `https://music.yandex.ru/search?text=${prepareSearchQuery(trackTitle, 'vkm')}`;
                        ytm_b.href = `https://youtube.com/search?q=${prepareSearchQuery(trackTitle, 'ytm')}`;
                        vkm_b.href = `https://vk.com/audios486247008?q=${prepareSearchQuery(trackTitle, 'yam')}`;
                        spo_b.href = `https://open.spotify.com/search/${prepareSearchQuery(trackTitle, 'spo')}`;
                    }
                    
                    // Показываем кнопки и статус
                    if (data.content){
                        plat_b.style.display = 'flex';
                        // yam_b.style.display = 'flex';
                        // ytm_b.style.display = 'flex';
                        // vkm_b.style.display = 'flex';
                    }
                    
                    statusDisplay.textContent = 'Подключено';
                    statusDisplay.style.color = '#4CAF50';
                    
                    discordAvailable = true;
                    return true;

                } catch (error) {
                    console.error('Error fetching from Discord:', error);
                    
                    if (discordAvailable) {
                        // Если Discord был доступен, а теперь нет - пробуем радио
                        discordAvailable = false;
                        await tryRadioStreams();
                    }
                    return false;
                }
            }

            async function tryRadioStreams() {
                const radioUrls = [
                    'https://drh-connect.dline-media.com/ketaruweb',
                    'https://s0.radioheart.ru:8000/ketarubot',
                    'https://s0.radioheart.ru:8000/ketaruweb'
                ];

                for (const url of radioUrls) {
                    try {
                        const controller = new AbortController();
                        const timeoutId = setTimeout(() => controller.abort(), 3000);
                        
                        const response = await fetch(url, {
                            method: 'HEAD',
                            mode: 'no-cors',
                            signal: controller.signal
                        });
                        
                        clearTimeout(timeoutId);
                        
                        // При no-cors мы не можем проверить статус, но если запрос не упал - сервер отвечает
                        statusDisplay.textContent = 'Подключено';
                        statusDisplay.style.color = '#4CAF50';
                        
                        // Если был старый трек, показываем что ожидаем новый
                        if (!lastTrackTitle) {
                            trackDisplay.textContent = 'Загрузка...';
                        }
                        
                        return true;
                        
                    } catch (error) {
                        console.log(`Radio ${url} not available:`, error);
                    }
                }
                
                // Если ни один радио поток не ответил
                statusDisplay.textContent = 'Не подключено';
                statusDisplay.style.color = '#f44336';
                
                // Не скрываем кнопки, если есть трек
                if (!lastTrackTitle) {
                    trackDisplay.textContent = '';
                    plat_b.style.display = 'none';
                    yam_b.style.display = 'none';
                    ytm_b.style.display = 'none';
                    vkm_b.style.display = 'none';
                }
                
                return false;
            }

            // Основная функция обновления
            async function updateTrack() {
                const discordSuccess = await fetchTrackFromDiscord();
                
                // Если Discord недоступен, проверяем радио
                if (!discordSuccess) {
                    await tryRadioStreams();
                }
            }

            // Функция для запуска обновлений
            function startUpdates() {
                // Первое обновление сразу
                updateTrack();
                
                // Обновляем каждые 5 секунд
                setInterval(updateTrack, 5000);
            }

            // Запускаем при загрузке страницы
            document.addEventListener('DOMContentLoaded', startUpdates);

            // Добавляем визуальный индикатор обновления (опционально)
            let timeoutId;
            trackDisplay.addEventListener('DOMSubtreeModified', function() {
                clearTimeout(timeoutId);
                trackDisplay.style.opacity = '0.7';
                timeoutId = setTimeout(() => {
                    trackDisplay.style.opacity = '1';
                }, 200);
            });
        </script>
        </div>

    <script>
        function setPlatform(name, image, url) {
            document.getElementById('player').src = url;
            document.getElementById('rt-span-plat').innerHTML = name;
            document.getElementById('rt-span-icon').src = image;
            const player = document.getElementById('player');
            player.style.opacity = '0';
            setTimeout(() => {
                player.style.opacity = '1';
            }, 300);
        }
        function createParticles() {
            const container = document.getElementById('floatingParticles');
            const particleCount = 50;
            for (let i = 0; i < particleCount; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                particle.style.left = Math.random() * 100 + 'vw';
                particle.style.animationDelay = Math.random() * 20 + 's';
                particle.style.animationDuration = (15 + Math.random() * 15) + 's';
                const size = 2 + Math.random() * 4;
                particle.style.width = size + 'px';
                particle.style.height = size + 'px';
                container.appendChild(particle);
            }
        }
        function initParallax() {
            const parallaxElements = document.querySelectorAll('.parallax-element');
            window.addEventListener('scroll', function() {
                const scrolled = window.pageYOffset;
                const rate = scrolled * -0.5;
                parallaxElements.forEach(element => {
                    element.style.transform = `translate3d(0, ${rate}px, 0)`;
                });
            });
        }
        document.addEventListener('DOMContentLoaded', function() {
            createParticles();
            initParallax();
            const observerOptions = {
                threshold: 0.1,
                rootMargin: '0px 0px -50px 0px'
            };
            const observer = new IntersectionObserver(function(entries) {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        entry.target.style.animationPlayState = 'running';
                    }
                });
            }, observerOptions);
            document.querySelectorAll('.main-title, .video-container, .platform-buttons').forEach(el => {
                observer.observe(el);
            });
        });
    </script>
